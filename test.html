<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>폴링레이트 툴팁 예시</title>
    <style>
        /* [1] 기존 프로젝트 스타일 느낌의 필터 박스 기본 세팅 */
        .filter-box {
            border: 1px solid #ccc;
            padding: 20px;
            width: 500px;
            font-family: sans-serif;
            font-size: 14px;
            margin: 50px auto;
        }

        /* [2] 툴팁을 감싸는 부모 요소 (폴링레이트 글자) */
        .tooltip {
            position: relative;
            display: inline-block;
            cursor: help;                /* 마우스 커서를 물음표 모양으로 */
            border-bottom: 1px dashed #888; /* 밑에 은은한 점선 표시 */
            font-weight: bold;
            color: #333;
        }

        /* [3] 평소에는 숨겨둘 설명창(말풍선) 디자인 */
        .tooltip .tooltiptext {
            visibility: hidden;          /* 평소에는 안 보이게 */
            opacity: 0;                  /* 투명하게 */
            width: 280px;                /* 설명창 넓이 */
            background-color: #ffffff;   /* 깔끔한 화이트 배경 */
            color: #333333;              /* 글자색 */
            text-align: left;
            border: 1px solid #ccc;      /* 원래 코드 테두리와 통일 */
            padding: 10px 12px;
            font-size: 12px;
            font-weight: normal;
            line-height: 1.6;
            
            /* 위치 선정: 글자 위쪽으로 띄우기 */
            position: absolute;
            z-index: 10;
            bottom: 130%;                /* 텍스트에서 위로 130%만큼 띄움 */
            left: 0;
            
            /* 슥 나타나는 부드러운 효과 */
            transition: opacity 0.2s ease-in-out;
        }

        /* [4] 마우스를 올렸을 때(Hover) 설명창을 보이게 만드는 코드 */
        .tooltip:hover .tooltiptext {
            visibility: visible;
            opacity: 1;
        }
    </style>
</head>
<body>

    <div class="filter-box">
        <span class="tooltip">폴링레이트 💡
            <span class="tooltiptext">
                마우스가 PC와 데이터를 주고받는 빈도(Hz)입니다.<br>
                숫자가 높을수록 포인터가 부드럽고 반응 속도가 빨라집니다.
            </span>
        </span> : 
        
        <input type="radio" name="hz" id="hz-any" checked> <label for="hz-any">Any</label>
        <input type="radio" name="hz" id="hz-1k"> <label for="hz-1k">1K</label>
        <input type="radio" name="hz" id="hz-4k"> <label for="hz-4k">4K</label>
    </div>

</body>
</html>
